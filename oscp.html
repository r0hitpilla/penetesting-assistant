<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OSCP Command Reference</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--s1:#161b22;--s2:#21262d;--s3:#30363d;
  --red:#e53935;--blue:#58a6ff;--green:#3fb950;--yellow:#d29922;
  --orange:#f0883e;--purple:#bc8cff;--cyan:#79c0ff;
  --text:#e6edf3;--dim:#8b949e;--muted:#6e7681;--border:#30363d;
  --r:6px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:14px}
button{cursor:pointer;border:none;font-family:inherit;transition:all .12s}
input,textarea,select{font-family:inherit;background:var(--s2);border:1px solid var(--border);color:var(--text);border-radius:var(--r);padding:.35rem .6rem;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--blue)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}
code{font-family:'Cascadia Code','Fira Code',Consolas,monospace;font-size:.82rem}

/* TOP BAR */
.topbar{background:var(--s1);border-bottom:1px solid var(--border);padding:.55rem 1rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;flex-shrink:0}
.logo{font-weight:800;font-size:1.05rem;color:var(--red);letter-spacing:1px;white-space:nowrap}
.logo span{color:var(--blue)}
.field-group{display:flex;align-items:center;gap:.35rem}
.field-group label{font-size:.72rem;color:var(--muted);white-space:nowrap}
.field-group input{width:140px;font-size:.82rem}
.field-group input.short{width:72px}
.search-wrap{flex:1;min-width:160px}
.search-wrap input{width:100%;font-size:.82rem}
.clear-btn{background:var(--s3);color:var(--dim);border-radius:var(--r);padding:.35rem .65rem;font-size:.78rem}
.clear-btn:hover{color:var(--text)}

/* LAYOUT */
.body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:185px;background:var(--s1);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:.5rem}
.cat-btn{width:100%;text-align:left;padding:.5rem .7rem;border-radius:var(--r);background:transparent;color:var(--dim);font-size:.83rem;margin-bottom:.15rem;display:flex;align-items:center;gap:.5rem;border:1px solid transparent}
.cat-btn:hover{background:var(--s2);color:var(--text)}
.cat-btn.active{background:var(--s2);color:var(--text);border-color:var(--border)}
.cat-btn .icon{font-size:1rem;width:20px;text-align:center}
.cat-btn .count{margin-left:auto;background:var(--s3);border-radius:10px;padding:0 .4rem;font-size:.68rem;color:var(--muted)}
.sidebar-sep{font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;padding:.6rem .5rem .3rem}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:1rem 1.2rem}

/* SECTION */
.section{margin-bottom:1.5rem}
.section-title{font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem}
.section-title .stag{background:var(--s2);border-radius:4px;padding:.05rem .4rem;font-size:.65rem;color:var(--dim)}

/* COMMAND ROW */
.cmd-row{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.35rem;position:relative}
.cmd-label{font-size:.72rem;color:var(--muted);white-space:nowrap;padding-top:.45rem;min-width:130px;max-width:130px;overflow:hidden;text-overflow:ellipsis}
.cmd-box{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:.4rem .6rem;font-size:.8rem;font-family:'Cascadia Code','Fira Code',Consolas,monospace;word-break:break-all;line-height:1.5;position:relative;cursor:pointer;transition:border-color .12s}
.cmd-box:hover{border-color:var(--blue)}
.cmd-box .hi-ip{color:var(--orange)}
.cmd-box .hi-port{color:var(--yellow)}
.cmd-box .hi-lhost{color:var(--cyan)}
.cmd-box .hi-lport{color:var(--purple)}
.cmd-box .hi-kw{color:var(--green)}
.copy-btn{background:var(--s3);color:var(--dim);border-radius:var(--r);padding:.35rem .55rem;font-size:.75rem;white-space:nowrap;flex-shrink:0}
.copy-btn:hover{background:var(--blue);color:#fff}
.copy-btn.copied{background:var(--green);color:#fff}

/* NOTE */
.note-row{display:flex;align-items:flex-start;gap:.5rem;margin-top:.25rem;margin-bottom:.5rem}
.note-area{flex:1;background:transparent;border:1px solid transparent;border-radius:var(--r);padding:.3rem .5rem;font-size:.78rem;color:var(--dim);resize:none;min-height:28px;line-height:1.4}
.note-area:focus{border-color:var(--border);background:var(--s2);color:var(--text)}
.note-area::placeholder{color:var(--muted)}

/* CATEGORY HEADER */
.cat-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem}
.cat-icon{font-size:1.5rem}
.cat-name{font-size:1.1rem;font-weight:700}
.cat-desc{font-size:.8rem;color:var(--dim);margin-top:.1rem}

/* SEARCH HIGHLIGHT */
.cmd-box mark{background:#3b4a1a;color:#d2e56a;border-radius:2px}

/* EMPTY */
.empty{text-align:center;padding:3rem;color:var(--muted);font-size:.9rem}
.empty .big{font-size:2rem;margin-bottom:.5rem}

/* TAG BADGES */
.tag{display:inline-block;border-radius:3px;padding:.05rem .4rem;font-size:.68rem;font-weight:700;margin-right:.3rem}
.tag.crit{background:#7f1d1d;color:#fca5a5}
.tag.high{background:#7c2d12;color:#fdba74}
.tag.info{background:#1e3a5f;color:#93c5fd}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">OSCP<span>REF</span></div>

  <div class="field-group">
    <label>TARGET IP</label>
    <input id="ip" type="text" placeholder="10.10.10.10" oninput="render()"/>
  </div>
  <div class="field-group">

  <div class="field-group">
    <label>LHOST</label>

  </div>
  <div class="field-group">
    <label>LPORT</label>
    <input id="lport" class="short" type="text" placeholder="4444" oninput="render()"/>
  </div>

  <div class="search-wrap">
    <input id="search" type="text" placeholder="&#128269; Search commands..." oninput="render()"/>
  </div>
  <button class="clear-btn" onclick="clearSearch()">Clear</button>
</div>

<div class="body">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>

// ================================================================
// STATE
// ================================================================
let activeCat = 'recon';
const notes = {};  // section key -> note text

function getVars(){
  return {
    IP:    document.getElementById('ip').value.trim()    || '{IP}',
    PORT:  document.getElementById('port').value.trim()  || '{PORT}',
    LHOST: document.getElementById('lhost').value.trim() || '{LHOST}',
    LPORT: document.getElementById('lport').value.trim() || '{LPORT}',
  };
}

function fill(cmd, vars){
  return cmd
    .replace(/\{IP\}/g,    vars.IP)
    .replace(/\{PORT\}/g,  vars.PORT)
    .replace(/\{LHOST\}/g, vars.LHOST)
    .replace(/\{LPORT\}/g, vars.LPORT);
}

function highlight(cmd, vars, query){
  let s = cmd
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Color variables
  const ip    = vars.IP    !== '{IP}'    ? escRx(vars.IP)    : escRx('{IP}');
  const port  = vars.PORT  !== '{PORT}'  ? escRx(vars.PORT)  : escRx('{PORT}');
  const lhost = vars.LHOST !== '{LHOST}' ? escRx(vars.LHOST) : escRx('{LHOST}');
  const lport = vars.LPORT !== '{LPORT}' ? escRx(vars.LPORT) : escRx('{LPORT}');

  s = s.replace(new RegExp(ip,   'g'), m=>`<span class="hi-ip">${m}</span>`);
  s = s.replace(new RegExp(port, 'g'), m=>`<span class="hi-port">${m}</span>`);
  s = s.replace(new RegExp(lhost,'g'), m=>`<span class="hi-lhost">${m}</span>`);
  s = s.replace(new RegExp(lport,'g'), m=>`<span class="hi-lport">${m}</span>`);

  // Search highlight
  if(query){
    const rx = new RegExp(`(${escRx(query)})`, 'gi');
    s = s.replace(rx, '<mark>$1</mark>');
  }
  return s;
}

function escRx(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function clearSearch(){
  document.getElementById('search').value = '';
  document.getElementById('ip').value = '';
  document.getElementById('port').value = '';
  document.getElementById('lhost').value = '';
  document.getElementById('lport').value = '';
  render();
}

// ================================================================
// RENDER
// ================================================================
function render(){
  renderSidebar();
  renderMain();
}

function renderSidebar(){
  const sb = document.getElementById('sidebar');
  sb.innerHTML = CATS.map(cat=>`
    <button class="cat-btn${cat.id===activeCat?' active':''}" onclick="setcat('${cat.id}')">
      <span class="icon">${cat.icon}</span>${cat.label}
    </button>
  `).join('');
}

function setcat(id){
  activeCat = id;
  render();
  document.getElementById('main').scrollTop = 0;
}

function renderMain(){
  const query = document.getElementById('search').value.trim().toLowerCase();
  const vars  = getVars();

  // If searching, show across all cats; else show active cat
  let catsToRender = query
    ? CATS
    : CATS.filter(c=>c.id===activeCat);

  let html = '';

  for(const cat of catsToRender){
    let catHtml = '';

    for(const sec of cat.sections){
      // Filter commands by query
      const matchedCmds = query
        ? sec.cmds.filter(cmd=>
            cmd.l.toLowerCase().includes(query) ||
            fill(cmd.c, vars).toLowerCase().includes(query)
          )
        : sec.cmds;

      if(!matchedCmds.length) continue;

      const secKey = cat.id + '_' + sec.title;
      const noteVal = (notes[secKey]||'').replace(/"/g,'&quot;');

      catHtml += `<div class="section">
        <div class="section-title">
          ${sec.title}
          ${sec.tag?`<span class="stag">${sec.tag}</span>`:''}
        </div>
        ${matchedCmds.map((cmd,i)=>{
          const filled = fill(cmd.c, vars);
          const displayed = highlight(filled, vars, query);
          const cmdId = `${secKey}_${i}`;
          return `<div class="cmd-row">
            <div class="cmd-label" title="${cmd.l}">${cmd.l}</div>
            <code class="cmd-box" onclick="copyCmd(this,'${encodeURIComponent(filled)}')">${displayed}</code>
            <button class="copy-btn" id="cp_${cmdId}" onclick="copyCmd(document.getElementById('cp_${cmdId}').previousElementSibling,'${encodeURIComponent(filled)}')">Copy</button>
          </div>`;
        }).join('')}
        <div class="note-row" style="margin-left:135px">
          <textarea class="note-area" rows="1" placeholder="Notes for this section..."
            oninput="saveNote('${secKey}',this)"
            onfocus="this.rows=3" onblur="this.rows=1"
          >${noteVal}</textarea>
        </div>
      </div>`;
    }

    if(!catHtml) continue;

    if(query){
      html += `<div style="margin-bottom:.25rem;font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">${cat.icon} ${cat.label}</div>`;
    } else {
      html += `<div class="cat-header">
        <div class="cat-icon">${cat.icon}</div>
        <div><div class="cat-name">${cat.label}</div><div class="cat-desc">${cat.desc}</div></div>
      </div>`;
    }
    html += catHtml;
  }

  if(!html){
    html = `<div class="empty"><div class="big">🔍</div>No commands match "<strong>${query}</strong>"</div>`;
  }

  document.getElementById('main').innerHTML = html;
}

// ================================================================
// COPY
// ================================================================
function copyCmd(el, encoded){
  const text = decodeURIComponent(encoded);
  navigator.clipboard.writeText(text).then(()=>{
    const btn = el.nextElementSibling || el;
    if(btn && btn.classList.contains('copy-btn')){
      const orig = btn.textContent;
      btn.textContent = '✓ Copied';
      btn.classList.add('copied');
      setTimeout(()=>{ btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
    }
  }).catch(()=>{
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

// ================================================================
// NOTES
// ================================================================
function saveNote(key, el){
  notes[key] = el.value;
  // Persist to localStorage
  try{ localStorage.setItem('oscp_notes', JSON.stringify(notes)); }catch(e){}
}

function loadNotes(){
  try{
    const saved = localStorage.getItem('oscp_notes');
    if(saved){ Object.assign(notes, JSON.parse(saved)); }
  }catch(e){}
}

// ================================================================
// INIT
// ================================================================
loadNotes();
render();
</script>
</body>
</html>
