<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OSCP Reference</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--s1:#161b22;--s2:#21262d;--s3:#30363d;
  --red:#e53935;--blue:#58a6ff;--green:#3fb950;--yellow:#d29922;
  --orange:#f0883e;--purple:#bc8cff;--cyan:#79c0ff;--pink:#ff7b72;
  --text:#e6edf3;--dim:#8b949e;--muted:#6e7681;--border:#30363d;--r:6px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:14px}
button{cursor:pointer;border:none;font-family:inherit;transition:all .12s}
input,textarea,select{font-family:inherit;background:var(--s2);border:1px solid var(--border);color:var(--text);border-radius:var(--r);padding:.35rem .6rem;outline:none}
input:focus,textarea:focus{border-color:var(--blue)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}
/* TOPBAR */
.topbar{background:var(--s1);border-bottom:1px solid var(--border);padding:.5rem .9rem;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;flex-shrink:0}
.logo{font-weight:800;font-size:1rem;color:var(--red);letter-spacing:1px;white-space:nowrap}.logo span{color:var(--blue)}
.fg{display:flex;align-items:center;gap:.3rem}
.fg label{font-size:.7rem;color:var(--muted);white-space:nowrap}
.fg input{width:148px;font-size:.8rem}.fg input.sm{width:72px}
.sbtn{background:var(--s3);color:var(--dim);border-radius:var(--r);padding:.3rem .6rem;font-size:.78rem}.sbtn:hover{color:var(--text)}
.sw{flex:1;min-width:150px}.sw input{width:100%;font-size:.82rem}
/* LAYOUT */
.body{display:flex;flex:1;overflow:hidden}
/* SIDEBAR */
.sidebar{width:178px;background:var(--s1);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:.4rem .35rem}
.cb{width:100%;text-align:left;padding:.45rem .65rem;border-radius:var(--r);background:transparent;color:var(--dim);font-size:.82rem;margin-bottom:.12rem;display:flex;align-items:center;gap:.45rem;border:1px solid transparent}
.cb:hover{background:var(--s2);color:var(--text)}.cb.active{background:var(--s2);color:var(--text);border-color:var(--border)}
.cb .ic{font-size:.95rem;width:18px;text-align:center}
/* MAIN */
.main{flex:1;overflow-y:auto;padding:.9rem 1.1rem}
/* SECTION */
.section{margin-bottom:1.4rem}
.stitle{font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.45rem;padding-bottom:.3rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem}
.stag{background:var(--s2);border-radius:3px;padding:.05rem .35rem;font-size:.65rem;color:var(--dim)}
/* CMD */
.cr{display:flex;align-items:flex-start;gap:.45rem;margin-bottom:.3rem}
.cl{font-size:.7rem;color:var(--muted);white-space:nowrap;padding-top:.42rem;min-width:140px;max-width:140px;overflow:hidden;text-overflow:ellipsis}
.cb2{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:.38rem .55rem;font-size:.78rem;font-family:'Cascadia Code','Fira Code',Consolas,monospace;word-break:break-all;line-height:1.5;cursor:pointer;transition:border-color .12s;white-space:pre-wrap}
.cb2:hover{border-color:var(--blue)}
.cb2 .hi{color:var(--orange)}.cb2 .hp{color:var(--yellow)}.cb2 .hl{color:var(--cyan)}.cb2 .hlp{color:var(--purple)}.cb2 .hk{color:var(--green)}.cb2 .hc{color:var(--pink)}
.cpbtn{background:var(--s3);color:var(--dim);border-radius:var(--r);padding:.3rem .5rem;font-size:.72rem;white-space:nowrap;flex-shrink:0}.cpbtn:hover{background:var(--blue);color:#fff}.cpbtn.ok{background:var(--green);color:#fff}
/* NOTE */
.nr{margin-left:145px;margin-bottom:.5rem;margin-top:.1rem}
.na{width:100%;background:transparent;border:1px solid transparent;border-radius:var(--r);padding:.28rem .5rem;font-size:.76rem;color:var(--dim);resize:none;min-height:26px;line-height:1.4}
.na:focus{border-color:var(--border);background:var(--s2);color:var(--text)}
.na::placeholder{color:var(--s3)}
/* CAT HEADER */
.ch{display:flex;align-items:center;gap:.65rem;margin-bottom:.85rem}
.chi{font-size:1.4rem}.chn{font-size:1rem;font-weight:700}.chd{font-size:.78rem;color:var(--dim);margin-top:.1rem}
/* SEARCH MARK */
.cb2 mark{background:#3b4a1a;color:#d2e56a;border-radius:2px}
/* EMPTY */
.empty{text-align:center;padding:3rem;color:var(--muted);font-size:.88rem}
/* TAGS */
.tag{display:inline-block;border-radius:3px;padding:.05rem .4rem;font-size:.68rem;font-weight:700;margin-right:.25rem}
.tc{background:#7f1d1d;color:#fca5a5}.th{background:#7c2d12;color:#fdba74}.tm{background:#713f12;color:#fde68a}.tl{background:#14532d;color:#86efac}.ti{background:#1e3a5f;color:#93c5fd}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">OSCP<span>REF</span></div>
  <div class="fg"><label>TARGET IP</label><input id="ip" placeholder="10.10.10.10" oninput="render()"/></div>
  <div class="fg"><label>PORT</label><input id="port" class="sm" placeholder="80" oninput="render()"/></div>
  <div class="fg"><label>LHOST (Kali)</label><input id="lh" placeholder="10.10.14.1" oninput="render()"/></div>
  <div class="fg"><label>LPORT</label><input id="lp" class="sm" placeholder="4444" oninput="render()"/></div>
  <div class="fg"><label>USER</label><input id="usr" class="sm" placeholder="user" oninput="render()"/></div>
  <div class="fg"><label>PASS</label><input id="pw" class="sm" placeholder="pass" oninput="render()"/></div>
  <div class="fg"><label>DOMAIN</label><input id="dom" placeholder="domain.htb" oninput="render()"/></div>
  <div class="sw"><input id="sq" placeholder="&#128269;  Search all commands..." oninput="render()"/></div>
  <button class="sbtn" onclick="clr()">✕ Clear</button>
</div>
<div class="body">
  <div class="sidebar" id="SB"></div>
  <div class="main" id="MN"></div>
</div>
<script>
// ── VARS ─────────────────────────────────────────────────────────
let AC='recon';
const NT={};
function V(){return{IP:document.getElementById('ip').value.trim()||'{IP}',PORT:document.getElementById('port').value.trim()||'{PORT}',LHOST:document.getElementById('lh').value.trim()||'{LHOST}',LPORT:document.getElementById('lp').value.trim()||'{LPORT}',USER:document.getElementById('usr').value.trim()||'{USER}',PASS:document.getElementById('pw').value.trim()||'{PASS}',DOMAIN:document.getElementById('dom').value.trim()||'{DOMAIN}'};}
function fill(c,v){return c.replace(/\{IP\}/g,v.IP).replace(/\{PORT\}/g,v.PORT).replace(/\{LHOST\}/g,v.LHOST).replace(/\{LPORT\}/g,v.LPORT).replace(/\{USER\}/g,v.USER).replace(/\{PASS\}/g,v.PASS).replace(/\{DOMAIN\}/g,v.DOMAIN);}
function er(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function eh(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hl(cmd,v,q){
  let s=eh(cmd);
  const pairs=[[v.IP,'hi'],[v.PORT,'hp'],[v.LHOST,'hl'],[v.LPORT,'hlp'],[v.USER,'hk'],[v.PASS,'hc']];
  for(const[val,cls] of pairs){if(val&&!val.startsWith('{'))s=s.replace(new RegExp(er(val),'g'),m=>`<span class="${cls}">${m}</span>`);}
  if(q)s=s.replace(new RegExp(`(${er(q)})`,'gi'),'<mark>$1</mark>');
  return s;
}
function clr(){['ip','port','lh','lp','usr','pw','dom','sq'].forEach(id=>document.getElementById(id).value='');render();}
// ── RENDER ───────────────────────────────────────────────────────
function render(){
  const v=V(),q=document.getElementById('sq').value.trim().toLowerCase();
  // sidebar
  document.getElementById('SB').innerHTML=CATS.map(c=>`<button class="cb${c.id===AC?' active':''}" onclick="AC='${c.id}';render()">${c.icon?`<span class="ic">${c.icon}</span>`:''}<span>${c.label}</span></button>`).join('');
  // main
  const cats=q?CATS:CATS.filter(c=>c.id===AC);
  let html='';
  for(const cat of cats){
    let ch='';
    for(const sec of cat.sections){
      const mc=q?sec.cmds.filter(c=>c.l.toLowerCase().includes(q)||fill(c.c,v).toLowerCase().includes(q)):sec.cmds;
      if(!mc.length)continue;
      const sk=cat.id+'_'+sec.title;
      const nv=(NT[sk]||'').replace(/"/g,'&quot;');
      ch+=`<div class="section"><div class="stitle">${eh(sec.title)}${sec.tag?` <span class="stag">${sec.tag}</span>`:''}</div>`;
      mc.forEach((cmd,i)=>{
        const f=fill(cmd.c,v),d=hl(f,v,q),id=`c${sk.replace(/\W/g,'_')}${i}`;
        ch+=`<div class="cr"><div class="cl" title="${eh(cmd.l)}">${eh(cmd.l)}</div><code class="cb2" id="${id}" onclick="CP('${id}','${encodeURIComponent(f)}')">${d}</code><button class="cpbtn" id="b${id}" onclick="CP('${id}','${encodeURIComponent(f)}')">Copy</button></div>`;
      });
      ch+=`<div class="nr"><textarea class="na" rows="1" placeholder="notes..." oninput="NT['${sk}']=this.value;try{localStorage.setItem('on',JSON.stringify(NT));}catch(e){}" onfocus="this.rows=3" onblur="this.rows=1">${nv}</textarea></div>`;
      ch+='</div>';
    }
    if(!ch)continue;
    if(q)html+=`<div style="font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:.2rem;margin-top:.8rem">${cat.icon} ${cat.label}</div>`;
    else html+=`<div class="ch"><div class="chi">${cat.icon}</div><div><div class="chn">${cat.label}</div><div class="chd">${cat.desc}</div></div></div>`;
    html+=ch;
  }
  if(!html)html=`<div class="empty">No commands match "<strong>${eh(q)}</strong>"</div>`;
  document.getElementById('MN').innerHTML=html;
}
function CP(id,enc){
  const t=decodeURIComponent(enc);
  navigator.clipboard.writeText(t).catch(()=>{const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);});
  const b=document.getElementById('b'+id);
  if(b){const o=b.textContent;b.textContent='✓';b.classList.add('ok');setTimeout(()=>{b.textContent=o;b.classList.remove('ok');},1400);}
}
// ── NOTES ────────────────────────────────────────────────────────
try{const s=localStorage.getItem('on');if(s)Object.assign(NT,JSON.parse(s));}catch(e){}
</script>
<script src="static/js/oscp-data.js"></script>
<script src="static/js/oscp-data2.js"></script>
</body>
</html>
